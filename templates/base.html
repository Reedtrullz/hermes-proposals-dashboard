<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Hermes{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root { --bg:#0d1117; --surface:#161b22; --surface2:#0f1620; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --green:#3fb950; --yellow:#d2991d; --red:#f85149; --purple:#a371f7; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; gap:16px; position:sticky; top:0; z-index:10; }
    header h1 { font-size:16px; font-weight:650; }
    nav { display:flex; gap:6px; flex-wrap:wrap; }
    nav a, .link { color:var(--muted); text-decoration:none; font-size:12px; padding:5px 8px; border-radius:5px; }
    nav a:hover, .link:hover { color:var(--text); background:var(--border); }
    main { max-width:1120px; margin:0 auto; padding:24px 16px 56px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
    .two-col { display:grid; grid-template-columns:minmax(0,1fr) 340px; gap:16px; align-items:start; }
    @media (max-width:900px){ .two-col { grid-template-columns:1fr; } }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:12px; }
    .card h2, .card h3 { font-size:15px; margin-bottom:8px; }
    .card h4 { font-size:12px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; letter-spacing:.04em; }
    .row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .split { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .muted { color:var(--muted); }
    .small { font-size:12px; }
    .tiny { font-size:11px; }
    .body { white-space:pre-wrap; font-size:14px; line-height:1.55; }
    .badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:650; white-space:nowrap; background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
    .badge-processing { background:#1a2332; color:var(--accent); animation:pulse 1.5s infinite; }
    .badge-review, .badge-medium { background:#2e2416; color:var(--yellow); }
    .badge-approved, .badge-active, .badge-low, .badge-completed { background:#1a2e1a; color:var(--green); }
    .badge-implemented, .badge-paused, .badge-running { background:#1a1a2e; color:var(--purple); }
    .badge-rejected, .badge-disabled, .badge-high, .badge-critical, .badge-failed { background:#3d1e1e; color:var(--red); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:4px; min-height:30px; padding:6px 12px; border-radius:5px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:12px; cursor:pointer; text-decoration:none; }
    .btn:hover { background:var(--border); }
    .btn-primary { background:#1f6feb; border-color:#1f6feb; color:white; }
    .btn-danger { background:#3d1e1e; border-color:var(--red); color:var(--red); }
    .field { margin-bottom:10px; }
    .field label { display:block; font-size:10px; color:var(--muted); margin-bottom:3px; text-transform:uppercase; }
    .field input, .field textarea, .field select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:4px; padding:7px 10px; color:var(--text); font-size:13px; font-family:inherit; }
    .field textarea { min-height:84px; resize:vertical; }
    .table { width:100%; border-collapse:collapse; }
    .table th, .table td { border-bottom:1px solid var(--border); padding:8px; text-align:left; font-size:12px; vertical-align:top; }
    .table th { color:var(--muted); font-size:10px; text-transform:uppercase; }
    .timeline { border-left:2px solid var(--border); margin-left:8px; padding-left:14px; }
    .timeline-item { margin-bottom:12px; position:relative; }
    .timeline-item:before { content:""; position:absolute; left:-20px; top:4px; width:8px; height:8px; border-radius:50%; background:var(--accent); }
    .empty { text-align:center; color:var(--muted); padding:40px 20px; }
    .meter { height:8px; background:var(--bg); border:1px solid var(--border); border-radius:99px; overflow:hidden; margin-top:6px; }
    .meter span { display:block; height:100%; background:var(--accent); min-width:2px; max-width:100%; }
    .warn { color:var(--yellow); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<header>
  <h1>Hermes Ops</h1>
  <nav>
    <a href="/proposals">Cards</a>
    <a href="/proposals/setup">Setup</a>
    <a href="/proposals/goals">Goals</a>
    <a href="/proposals/agents">Agents</a>
    <a href="/proposals/workflows">Workflows</a>
    <a href="/proposals/approvals">Approvals</a>
    <a href="/proposals/budgets">Budgets</a>
  </nav>
</header>
<main>
  {% block content %}{% endblock %}
</main>
<script>
function reltime(ts){const d=(Date.now()/1000)-ts;if(d<60)return'just now';if(d<3600)return Math.floor(d/60)+'m ago';if(d<86400)return Math.floor(d/3600)+'h ago';return Math.floor(d/86400)+'d ago';}
function md(s){return s.replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n- (.+)/g,'\n<span style="display:block;margin-left:12px;margin-top:2px">- $1</span>');}
function hydrate(){
  document.querySelectorAll('.reltime').forEach(e=>{e.textContent=reltime(parseInt(e.dataset.ts));});
  document.querySelectorAll('.md-body').forEach(e=>{e.innerHTML=md(e.textContent);});
}
document.addEventListener('htmx:afterSettle', hydrate);
window.addEventListener('load', hydrate);
</script>
</body>
</html>
